<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kelly Curve Explorer</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --soft: #f2f5fa;
      --line: #dde5f0;
      --text: #122033;
      --muted: #607089;
      --blue: #2f6fed;
      --green: #1b936c;
      --red: #d9485f;
      --shadow: 0 14px 36px rgba(24, 44, 78, 0.08);
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 48px;
    }
    .wrap {
      width: min(920px, calc(100vw - 20px));
      margin: 0 auto;
      padding: 14px 0 28px;
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hero { padding: 16px; }
    h1 {
      margin: 0;
      font-size: clamp(28px, 7vw, 44px);
      line-height: 1.06;
      letter-spacing: -.03em;
    }
    .lead {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }
    .hero-why {
      margin: 10px 0 0;
      color: #4c5d75;
      font-size: 14px;
      line-height: 1.6;
      max-width: 760px;
    }
    .hero-formula {
      color: #35527d;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .95em;
      white-space: nowrap;
    }
    .asset-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 0;
    }
    .asset-tab {
      appearance: none;
      border: 1px solid #d5deea;
      background: #ffffff;
      color: var(--text);
      border-radius: 14px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(18, 32, 51, 0.04);
      transition: background-color .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .asset-tab.active {
      background: #eef4ff;
      border-color: #9ebdff;
      color: #214b9a;
      box-shadow: 0 8px 18px rgba(47, 111, 237, 0.12);
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
        .jump-chips {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-top: 0;
    }
    .jump-chip {
      appearance: none;
      border: 1px solid #d5deea;
      background: #ffffff;
      color: var(--text);
      border-radius: 14px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      text-align: center;
      box-shadow: 0 1px 2px rgba(18, 32, 51, 0.04);
      transition: background-color .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .jump-chip.active {
      background: #eef4ff;
      border-color: #9ebdff;
      color: #214b9a;
      box-shadow: 0 8px 18px rgba(47, 111, 237, 0.12);
    }
    .pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .chart-panel {
      margin-top: 14px;
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }
    .chart-wrap {
      position: relative;
      margin-top: 14px;
      border: 1px solid #e3e8ef;
      border-radius: 24px;
      background: #f7f9fc;
      box-shadow: 0 12px 28px rgba(30, 55, 90, 0.06);
      overflow: hidden;
    }
    #kellyChart {
      width: 100%;
      height: min(54vh, 520px);
      min-height: 340px;
      display: block;
      touch-action: none;
    }
    .controls-panel {
      margin-top: 18px;
      padding: 0 2px;
    }
    .controls-group + .controls-group {
      margin-top: 14px;
    }
    .dock-title {
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      margin: 0 0 8px;
    }
    .dock-row { width: 100%; }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }
    .kpi {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
    }
    .kpi .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .kpi .value {
      margin-top: 6px;
      font-size: clamp(22px, 5vw, 30px);
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -.02em;
    }
    .kpi .note {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .status {
      margin-top: 12px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid #dbe8ff;
      padding: 14px;
      font-weight: 700;
      color: #214b9a;
      min-height: 56px;
    }
    .block-title {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .slider-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .slider-value {
      color: var(--text);
      font-weight: 800;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
      margin: 0;
    }
    .muted { color: var(--muted); }
    .status-main {
      display: block;
    }
    .status-subnote {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.45;
      font-weight: 600;
      color: #5f7698;
    }

    @media (max-width: 740px) {
      .wrap { width: calc(100vw - 16px); }
      .hero { padding: 14px; }
      h1 { font-size: clamp(24px, 8vw, 30px); }
      .lead { margin-top: 8px; font-size: 13px; line-height: 1.45; }
      .hero-why { margin-top: 8px; font-size: 12px; line-height: 1.5; }
      .hero-formula { font-size: .92em; }
      .hero-meta { gap: 6px; margin-top: 10px; }
      .pill { padding: 6px 9px; font-size: 11px; }
      .asset-tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .asset-tab, .jump-chip {
        border-radius: 12px;
        padding: 8px 8px;
        font-size: 11px;
      }
      .kpi-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        margin-top: 10px;
      }
      .kpi {
        border-radius: 12px;
        padding: 8px;
      }
      .kpi .label {
        font-size: 10px;
        line-height: 1.25;
      }
      .kpi .value {
        margin-top: 4px;
        font-size: clamp(14px, 4.8vw, 18px);
      }
      .kpi .note {
        margin-top: 4px;
        font-size: 10px;
        line-height: 1.25;
      }
      .status {
        margin-top: 8px;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 12px;
        line-height: 1.45;
        min-height: 0;
      }
      .status-subnote {
        margin-top: 5px;
        font-size: 11px;
        line-height: 1.4;
      }
      .chart-panel { padding: 0; }
      .chart-wrap {
        margin-top: 12px;
        border-radius: 18px;
      }
      .controls-panel { margin-top: 14px; padding: 0; }
      .controls-group + .controls-group { margin-top: 12px; }
      .jump-chips { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      #kellyChart { height: 38vh; min-height: 240px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero panel chart-panel">
      <h1>Kelly Curve Explorer</h1>
      <p class="lead">S&amp;P500・Nasdaq-100・半導体指数で、最適レバレッジの山頂を直感でつかむ</p>
      <p class="hero-why">レバレッジを上げると期待リターンは押し上がりますが、同時に値動きの荒さも強く効きます。その綱引きの結果、成長率のカーブは山型になります。<span class="hero-formula">g(L) ≈ r + L(μ − r) − ½L²σ²</span></p>

      <div class="hero-meta">
        <div class="pill" id="pillMu">期待リターン μ 10%</div>
        <div class="pill" id="pillSigma">ボラティリティ σ 17%</div>
        <div class="pill" id="pillRate">借入金利 r 4%</div>
      </div>
      <div class="chart-wrap">
        <canvas id="kellyChart"></canvas>
      </div>

      <div class="kpi-grid">
        <div class="kpi">
          <div class="label">最適レバレッジ</div>
          <div class="value" id="kpiOptimal">2.08x</div>
          <div class="note">理論上の山頂</div>
        </div>
        <div class="kpi">
          <div class="label">今のレバレッジ</div>
          <div class="value" id="kpiCurrent">1.00x</div>
          <div class="note">グラフ上の青い点</div>
        </div>
        <div class="kpi">
          <div class="label">幾何平均成長率</div>
          <div class="value" id="kpiGrowth">8.56%</div>
          <div class="note">今の倍率での成長率</div>
        </div>
      </div>

      <div class="status" id="statusBox"></div>
    </section>
    <section class="controls-panel">
      <div class="controls-group">
        <div class="dock-title">資産を切り替える</div>
        <div class="dock-row asset-tabs" id="assetTabs">
          <button class="asset-tab active" data-asset="sp500">S&amp;P500</button>
          <button class="asset-tab" data-asset="nasdaq">Nasdaq-100</button>
          <button class="asset-tab" data-asset="semi">半導体指数</button>
        </div>
      </div>
      <div class="controls-group">
        <div class="dock-title">代表的な倍率を見る</div>
        <div class="dock-row jump-chips" id="jumpChips">
          <button class="jump-chip active" data-jump="1">1x</button>
          <button class="jump-chip" data-jump="2">2x</button>
          <button class="jump-chip" data-jump="3">3x</button>
          <button class="jump-chip" data-jump="half">Half Kelly</button>
          <button class="jump-chip" data-jump="optimal">Optimal</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const assets = {
      sp500: { label: 'S&P500', mu: 0.10, sigma: 0.17, rate: 0.04 },
      nasdaq: { label: 'Nasdaq-100', mu: 0.12, sigma: 0.24, rate: 0.04 },
      semi: { label: '半導体指数', mu: 0.13, sigma: 0.32, rate: 0.04 }
    };

    const state = { asset: 'sp500', mu: 0.10, sigma: 0.17, rate: 0.04, lev: 1.00, selectedJump: '1' };

    const el = id => document.getElementById(id);
    const fmtPct = v => `${(v * 100).toFixed(1)}%`;
    const fmtPct2 = v => `${(v * 100).toFixed(2)}%`;
    const fmtLev = v => `${v.toFixed(2)}x`;
    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
    const growth = (L, mu, sigma, rate) => rate + L * (mu - rate) - 0.5 * L * L * sigma * sigma;
    const optimalLev = (mu, sigma, rate) => {
      if (!Number.isFinite(mu) || !Number.isFinite(sigma) || !Number.isFinite(rate) || sigma <= 0) {
        return 0;
      }
      return Math.max(0, (mu - rate) / (sigma * sigma));
    };

    const canvas = el('kellyChart');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      draw();
    }

    function setJump(key) {
      const opt = optimalLev(state.mu, state.sigma, state.rate);
      state.selectedJump = key;
      if (key === 'half') state.lev = opt / 2;
      else if (key === 'optimal') state.lev = opt;
      else state.lev = +key;
      if (!Number.isFinite(state.lev)) state.lev = 0;
      state.lev = clamp(state.lev, 0, 4);
      document.querySelectorAll('.jump-chip').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.jump === key);
      });
      draw();
    }

    function setAsset(key) {
      const a = assets[key];
      if (!a) return;
      state.asset = key;
      state.mu = a.mu;
      state.sigma = a.sigma;
      state.rate = a.rate;
      state.lev = clamp(state.lev, 0, 4);
      document.querySelectorAll('.asset-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.asset === key);
      });
      syncControls();
      setJump(state.selectedJump);
    }

    function syncControls() {
      el('pillMu').textContent = `期待リターン μ ${fmtPct(state.mu)}`;
      el('pillSigma').textContent = `ボラティリティ σ ${fmtPct(state.sigma)}`;
      el('pillRate').textContent = `借入金利 r ${fmtPct(state.rate)}`;
    }

    function buildStatus(current, optimal, currentGrowth) {
      const half = optimal / 2;
      if (current < optimal * 0.8) {
        return `山頂は ${fmtLev(optimal)} 付近です。今の ${fmtLev(current)} はまだ山の左側にあり、幾何平均成長率は ${fmtPct2(currentGrowth)} です。レバレッジを増やすと成長率が上がりやすい位置です。`;
      }
      if (Math.abs(current - optimal) < 0.15) {
        return `今の ${fmtLev(current)} は山頂付近です。幾何平均成長率は ${fmtPct2(currentGrowth)} で、このあたりが理論上の最大になりやすい位置です。`;
      }
      if (current > optimal) {
        return `今の ${fmtLev(current)} は山頂 ${fmtLev(optimal)} を越えています。幾何平均成長率は ${fmtPct2(currentGrowth)} で、ここからはレバレッジを増やすほど、期待リターンよりボラティリティの悪影響が勝ちやすくなります。`;
      }
      return `今の ${fmtLev(current)} はハーフケリー ${fmtLev(half)} と山頂 ${fmtLev(optimal)} の間です。幾何平均成長率は ${fmtPct2(currentGrowth)} で、実運用ではこのあたりでも十分に攻めた水準です。`;
    }

    function buildStatusNote(optimal) {
      return `実運用では山頂より少し左、ハーフケリー ${fmtLev(optimal / 2)} 前後でリスクを抑える考え方がよく使われます。`;
    }

    function draw() {
      const width = canvas.getBoundingClientRect().width;
      const height = canvas.getBoundingClientRect().height;
      if (!width || !height) return;
      ctx.clearRect(0, 0, width, height);

      const pad = { l: 50, r: 18, t: 18, b: 34 };
      const rect = { x: pad.l, y: pad.t, w: width - pad.l - pad.r, h: height - pad.t - pad.b };
      const maxL = 4;
      const opt = optimalLev(state.mu, state.sigma, state.rate);
      const optOnChart = clamp(opt, 0, maxL);
      const currentOnChart = clamp(state.lev, 0, maxL);
      const curve = [];
      for (let i = 0; i <= 400; i++) {
        const L = maxL * i / 400;
        curve.push({ L, g: growth(L, state.mu, state.sigma, state.rate) });
      }
      const curG = growth(currentOnChart, state.mu, state.sigma, state.rate);
      const optG = growth(optOnChart, state.mu, state.sigma, state.rate);
      const yMin = Math.min(-0.20, ...curve.map(p => p.g), curG - 0.02);
      const yMax = Math.max(0.16, ...curve.map(p => p.g), optG + 0.02);
      const ySpan = yMax - yMin || 1;
      const xMap = v => rect.x + rect.w * (clamp(v, 0, maxL) / maxL);
      const yMap = v => rect.y + rect.h * (1 - (v - yMin) / ySpan);

      ctx.strokeStyle = 'rgba(96,112,137,.16)';
      ctx.lineWidth = 1;
      ctx.font = '12px system-ui, sans-serif';
      ctx.fillStyle = 'rgba(96,112,137,.92)';

      [-0.10, 0, 0.05, 0.10, 0.15].forEach(v => {
        if (v < yMin || v > yMax) return;
        const yy = yMap(v);
        ctx.beginPath(); ctx.moveTo(rect.x, yy); ctx.lineTo(rect.x + rect.w, yy); ctx.stroke();
        ctx.fillText(`${(v * 100).toFixed(0)}%`, 8, yy + 4);
      });
      [0, 1, 2, 3, 4].forEach(v => {
        const xx = xMap(v);
        ctx.beginPath(); ctx.moveTo(xx, rect.y); ctx.lineTo(xx, rect.y + rect.h); ctx.stroke();
        ctx.fillText(`${v}x`, xx - 9, rect.y + rect.h + 20);
      });

      ctx.beginPath();
      ctx.strokeStyle = '#2f6fed';
      ctx.lineWidth = 4;
      curve.forEach((p, i) => {
        const xx = xMap(p.L), yy = yMap(p.g);
        if (i === 0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy);
      });
      ctx.stroke();

      [1, 2, 3].forEach(v => {
        const yy = yMap(growth(v, state.mu, state.sigma, state.rate));
        const xx = xMap(v);
        ctx.save();
        ctx.setLineDash([5, 6]);
        ctx.strokeStyle = v === 3 ? 'rgba(217,72,95,.45)' : 'rgba(47,111,237,.22)';
        ctx.beginPath(); ctx.moveTo(xx, rect.y); ctx.lineTo(xx, rect.y + rect.h); ctx.stroke();
        ctx.restore();
        ctx.fillStyle = v === 3 ? '#d9485f' : '#7e8fab';
        ctx.fillText(`${v}x`, xx - 7, Math.max(rect.y + 16, yy - 10));
      });

      const drawPoint = (x, y, color, radius=7) => {
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(x, y, radius / 2.6, 0, Math.PI * 2); ctx.fill();
      };

      const pointsOverlap = Math.abs(currentOnChart - optOnChart) < 0.02 && Math.abs(curG - optG) < 0.002;
      if (pointsOverlap) {
        const x = xMap(optOnChart);
        const y = yMap(optG);
        drawPoint(x, y, '#1b936c', 9);
        ctx.strokeStyle = '#2f6fed';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        drawPoint(xMap(optOnChart), yMap(optG), '#1b936c', 8);
        drawPoint(xMap(currentOnChart), yMap(curG), '#2f6fed', 8);
      }

      ctx.fillStyle = '#1b936c';
      ctx.font = '700 12px system-ui, sans-serif';
      ctx.fillText(`山頂 ${fmtLev(opt)}`, Math.max(rect.x + 6, xMap(optOnChart) - 22), Math.max(rect.y + 14, yMap(optG) - 14));
      ctx.fillStyle = '#2f6fed';
      ctx.fillText(`今 ${fmtLev(state.lev)}`, Math.max(rect.x + 6, xMap(currentOnChart) - 18), yMap(curG) + 22);

      el('kpiOptimal').textContent = fmtLev(opt);
      el('kpiCurrent').textContent = fmtLev(state.lev);
      el('kpiGrowth').textContent = fmtPct2(curG);
      el('statusBox').innerHTML = `<span class="status-main">${buildStatus(state.lev, opt, curG)}</span><span class="status-subnote">${buildStatusNote(opt)}</span>`;
    }


    document.querySelectorAll('.asset-tab').forEach(btn => {
      btn.addEventListener('click', () => setAsset(btn.dataset.asset));
    });
    document.querySelectorAll('.jump-chip').forEach(btn => {
      btn.addEventListener('click', () => setJump(btn.dataset.jump));
    });
    window.addEventListener('resize', resizeCanvas);

    syncControls();
    setJump('1');
    resizeCanvas();
  </script>
</body>
</html>
